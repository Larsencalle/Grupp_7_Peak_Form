<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>PeakForm Skapa konto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidan">
        <section class="vanster">
            <p>PeakForm</p>
            <h3>Get started!</h3>
            <h1>Skapa konto</h1>

            <div class="vit-box">
                <form>
                    <p>Namn: <input type="text" name="namn" required> *</p>
                    <p>Email: <input type="email" name="email" required> *</p>
                    <p>Lösenord: <input type="password" name="losen" required> *</p>
                    
                    <h3>Biometrics</h3>
                    <p>Vikt: <input type="text" name="vikt"></p>
                    <p>Längd: <input type="text" name="langd"></p>
                    <p>Kön: <input type="text" name="kon"></p>
                    <p>Ålder: <input type="text" name="alder"></p>

                    <p><a href="inlogg.html" class="form-knapp">Skapa konto</a></p>
                </form>
            </div>
        </section>

        <section class="hoger">
            <img src="https://images.unsplash.com/photo-1592588253414-887759037c2a?q=80&w=2070&auto=format&fit=crop" alt="Träning">
        </section>
    </div>

</body>
</html>
