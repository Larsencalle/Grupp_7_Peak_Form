<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeakForm - Logga in</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="split-layout">
        <section class="left-section">
            <p>PeakForm</p>
            <h1>Logga in</h1>

            <div class="form-box">
                <!--Visar felmeddelanden, tex om e-posten redan finns-->
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="error-message-box">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}

                <form action="/process_login" method="POST">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Lösenord:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="form-button">Logga in</button>
                </form>
            </div>
        </section>

        <section class="right-section">
            <img src="https://images.unsplash.com/photo-1544033527-b192daee1f5b?q=80&w=2070&auto=format&fit=crop" alt="Träning med hantlar">
        </section>
    </div>

</body>
</html>
