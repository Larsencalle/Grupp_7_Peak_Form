<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>PeakForm - Logga in</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="split-layout">
        <section class="vanster">
            <p>PeakForm</p>
            <h1>Logga in</h1>

            <div class="form-box">
                <form action="/logga_in" method="POST"> 
                    <div class="form-group">
                        <label for="username">Email:</label>
                        <input type="email" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Lösenord:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="form-knapp">Logga in</button>
                </form>
            </div>
        </section>

        <section class="hoger">
            <img src="https://images.unsplash.com/photo-1544033527-b192daee1f5b?q=80&w=2070&auto=format&fit=crop" alt="Träning med hantlar">
        </section>
    </div>

</body>
</html>
