<!DOCTYPE html>
<html lang = "sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeakForm - Redigera profil</title>
    <link rel= "stylesheet" href="/static/style.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-layout">

        <nav class="sidebar">
            <h1>PeakForm</h1>
            <ul>
                <li><a href="/dashboard">Hem</a></li>
                <li><a href="/profile" class="active">Min profil</a></li>
                <li><a href="/create_program">Mina program</a></li>
                <li><a href="/exercise">Övningsdatabas</a></li>
                <li><a href="#">Logga Pass</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <h2>Redigera profil</h2>

            <div class="profile-box">
                <form action="/update_profile" method="POST">
                    <p><strong>Email:</strong> {{ user[1] }}</p>

                    <label for="name">Namn</label>
                    <input type="text" id="name" name="name" value="{{ user[0] }}">

                    <label for="weight">Vikt</label>
                    <input type="number" id="weight" name="weight" value="{{ user[2] }}">

                    <label for="height">Längd</label>
                    <input type="number" id="height" name="height" value="{{ user[3] }}">

                    <label for="age">Ålder</label>
                    <input type="number" id="age" name="age" value="{{ user[4] }}">

                    <button type="submit" class="form-button profile-button">Spara ändringar</button>

                </form>

                <a href="/profile" class="small-button">Tillbaka</a>

            </div>
        </main>
</div>
</body>

</html>
